name: Quarantine Tracker

# Keeps the quarantined-rule index in sync with the actual YAML on disk.
#
# `detections/splunk-imports/_quarantine/README.md` is auto-generated by
# `scripts/build_quarantine_index.py` from the 1,989 quarantined rules. Without
# CI enforcement the index silently drifts the moment someone adds, removes, or
# rewrites a quarantined rule, and the community workstream that translates
# these into native AiSOC detections loses its source of truth.
#
# This workflow re-runs the generator in `--check` mode on every PR/push that
# touches the quarantine directory or the generator script, and fails if the
# checked-in README is stale.
on:
  push:
    branches: [main, develop]
    paths:
      - "detections/splunk-imports/_quarantine/**"
      - "scripts/build_quarantine_index.py"
      - ".github/workflows/quarantine-tracker.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "detections/splunk-imports/_quarantine/**"
      - "scripts/build_quarantine_index.py"
      - ".github/workflows/quarantine-tracker.yml"

jobs:
  index-in-sync:
    name: Quarantine README is in sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Verify quarantine index is up to date
        id: check
        run: python3 scripts/build_quarantine_index.py --check

      - name: Show diff if README is stale
        if: failure() && steps.check.outcome == 'failure'
        run: |
          echo "::group::Regenerating README to show the drift"
          python3 scripts/build_quarantine_index.py
          echo "::endgroup::"
          echo "::group::git diff against the checked-in README"
          git --no-pager diff detections/splunk-imports/_quarantine/README.md || true
          echo "::endgroup::"
          echo ""
          echo "::error file=detections/splunk-imports/_quarantine/README.md::Quarantine index is out of date. Re-run 'python3 scripts/build_quarantine_index.py' locally and commit the regenerated README."

      - name: Quarantine summary
        if: always()
        run: |
          total=$(find detections/splunk-imports/_quarantine -name "*.yaml" 2>/dev/null | wc -l | tr -d ' ')
          echo "### Quarantine Tracker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Quarantined rules on disk: $total**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Index file: \`detections/splunk-imports/_quarantine/README.md\`" >> $GITHUB_STEP_SUMMARY
          echo "Generator: \`scripts/build_quarantine_index.py\`" >> $GITHUB_STEP_SUMMARY
