name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CLEAN="${VERSION#v}"
          BODY=$(awk "/^## \[${CLEAN}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AiSOC ${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Build & push Docker images
  docker-push:
    name: Docker — Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: release
    strategy:
      matrix:
        include:
          - service: api
            context: services/api
            image: ghcr.io/beenuar/aisoc-core-api
          - service: enrichment
            context: services/enrichment
            image: ghcr.io/beenuar/aisoc-enrichment
          - service: ingest
            context: services/ingest
            image: ghcr.io/beenuar/aisoc-ingest
          - service: realtime
            context: services/realtime
            image: ghcr.io/beenuar/aisoc-realtime
          - service: web
            context: apps/web
            image: ghcr.io/beenuar/aisoc-web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.ref_name }}
            ${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
